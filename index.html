<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)">

  <title>옥모닝 표현 사전 — 상황별 영어 표현 검색</title>
  <meta name="description" content="상황별 영어 표현을 검색하고 바로 시청하세요. 260개+ 영어 표현을 상황, 카테고리, AI 검색으로 찾아보세요.">

  <meta property="og:title" content="옥모닝 표현 사전">
  <meta property="og:description" content="상황별 영어 표현을 검색하고 바로 시청하세요">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    button:active, a:active, [onclick]:active, .tag-pill:active, .card:active {
      opacity: 0.7;
      transition: opacity 0.1s;
    }

    button, a, [onclick], .tag-pill, .card {
      transition: opacity 0.15s;
    }

    :root {
      --bg: #FAF9F6;
      --bg-card: #FFFFFF;
      --bg-warm: #FFF8F0;
      --bg-subtle: #F5F3EF;
      --text-primary: #1A1814;
      --text-secondary: #6B6560;
      --text-tertiary: #A09A93;
      --border: #EDEAE5;
      --border-hover: #DBD7D0;
      --accent: #C2785C;
      --accent-soft: #F0DDD3;
      --accent-dark: #2C2825;
      --study: #2F7D7E;
      --study-soft: #E3F1F1;
      --quiz: #5C65C2;
      --quiz-soft: #EAECFF;
      --diff-beginner: #5B8C5A;
      --diff-intermediate: #C2785C;
      --diff-advanced: #8B5A6B;
      --success: #5B8C5A;
      --danger: #B45A5A;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1814;
        --bg-card: #242220;
        --bg-warm: #2A2520;
        --bg-subtle: #2E2B27;
        --text-primary: #EAE7E1;
        --text-secondary: #A09A93;
        --text-tertiary: #6B6560;
        --border: #3A3733;
        --border-hover: #4A4743;
        --accent: #D4916F;
        --accent-soft: #3A2E28;
        --accent-dark: #EAE7E1;
        --study: #7CC7C8;
        --study-soft: #213333;
        --quiz: #9CA4FF;
        --quiz-soft: #282B48;
        --danger: #E28D8D;
        --shadow-card: 0 1px 3px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.18);
      }
    }

    body {
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 16% -8%, rgba(47, 125, 126, 0.10), transparent 28%),
        radial-gradient(circle at 92% 8%, rgba(92, 101, 194, 0.10), transparent 24%),
        var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .hub-tabs {
      position: sticky;
      top: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      margin: 0 -4px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--bg-card) 92%, transparent);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px);
    }

    .hub-tab {
      min-height: 48px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .hub-tab.active {
      color: #FFFFFF;
      background: var(--accent-dark);
    }

    .hub-tab[data-hub="quiz"].active {
      background: var(--quiz);
    }

    .hub-panel.hidden {
      display: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 0 20px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1A1814, #3A3733);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo span {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 18px;
      color: #FFFFFF;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-info h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .header-info a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .header-info a:hover {
      color: var(--accent);
    }

    .header-bookmark-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: background 0.2s;
      flex-shrink: 0;
      color: var(--text-tertiary);
    }

    .header-bookmark-btn:hover {
      background: var(--bg-subtle);
    }

    .header-bookmark-btn.active {
      color: var(--accent);
    }

    .header-bookmark-btn svg {
      width: 24px;
      height: 24px;
    }

    /* Daily Feature */
    .daily-card {
      background: var(--bg-warm);
      border-left: 4px solid var(--accent);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .daily-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .daily-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .daily-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }

    .daily-expression {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 19px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .daily-meaning {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .daily-situation {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .daily-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .daily-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .daily-watch {
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    /* Daily Quote */
    .daily-quote {
      text-align: center;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .daily-quote p {
      font-style: italic;
      font-size: 13px;
      color: var(--text-tertiary);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 52px;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: var(--bg-card);
      padding: 0 48px;
      font-size: 16px;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      min-width: 36px;
      min-height: 36px;
      border-radius: 50%;
      background: var(--bg-subtle);
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1;
      -webkit-tap-highlight-color: rgba(0,0,0,0.05);
    }

    .search-clear.visible {
      display: flex;
    }

    .llm-indicator {
      font-size: 13px;
      color: var(--accent);
      padding: 6px 0;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .llm-indicator.visible {
      display: flex;
    }

    .llm-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Category Filter */
    .tags-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-top: 12px;
      margin-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .tags-row::-webkit-scrollbar {
      display: none;
    }

    .tag-pill {
      flex-shrink: 0;
      padding: 10px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      transition: all 0.2s;
      white-space: nowrap;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: rgba(0,0,0,0.05);
    }

    .tag-pill.active {
      background: var(--accent-dark);
      color: #FFFFFF;
      border-color: var(--accent-dark);
    }

    .category-count {
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 8px 0;
      display: none;
    }

    .category-count.visible {
      display: block;
    }

    /* Result count & sort */
    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 4px;
    }

    .result-count {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .result-count strong {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .sort-toggle {
      font-size: 13px;
      color: var(--text-tertiary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      padding: 8px 14px;
      min-height: 40px;
      -webkit-tap-highlight-color: rgba(0,0,0,0.05);
    }

    .sort-toggle span.active {
      color: var(--text-primary);
      font-weight: 700;
    }

    /* Cards */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.4s ease-out both;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .difficulty-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .difficulty-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .diff-beginner .difficulty-dot { background: var(--diff-beginner); }
    .diff-beginner { color: var(--diff-beginner); }
    .diff-intermediate .difficulty-dot { background: var(--diff-intermediate); }
    .diff-intermediate { color: var(--diff-intermediate); }
    .diff-advanced .difficulty-dot { background: var(--diff-advanced); }
    .diff-advanced { color: var(--diff-advanced); }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-action-btn {
      min-width: 44px;
      min-height: 44px;
      border: none;
      background: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background 0.2s;
      color: var(--text-tertiary);
      -webkit-tap-highlight-color: rgba(0,0,0,0.05);
    }

    .card-action-btn:hover {
      background: var(--bg-subtle);
    }

    .card-action-btn svg {
      width: 18px;
      height: 18px;
    }

    .card-action-btn.bookmarked {
      color: var(--accent);
    }

    .card-action-btn.watch-btn {
      color: var(--accent);
      gap: 4px;
      width: auto;
      padding: 8px 16px;
      min-height: 44px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
    }

    .card-expression {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 17px;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .card-meaning {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .card-situation {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .card-category-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-tertiary);
      background: var(--bg-subtle);
      border-radius: 12px;
      padding: 4px 10px;
    }

    /* CTA Banner */
    .cta-banner {
      background: var(--accent-dark);
      border-radius: 16px;
      padding: 24px 20px;
      color: #FFFFFF;
      text-align: center;
    }

    .cta-banner h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .cta-banner p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .cta-button {
      display: inline-block;
      background: var(--accent);
      color: #FFFFFF;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .cta-button:hover {
      opacity: 0.9;
    }

    /* Bottom CTA Bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    .bottom-bar.visible {
      transform: translateY(0);
    }

    .bottom-bar a {
      color: #FFFFFF;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .bottom-bar-close {
      position: absolute;
      right: 12px;
      min-width: 44px;
      min-height: 44px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #FFFFFF;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 0;
    }

    .empty-state .empty-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state .empty-subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 20px;
    }

    .suggested-searches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggested-pill {
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      transition: opacity 0.2s;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .suggested-pill:hover {
      opacity: 0.8;
    }

    /* Quiz Hub */
    .quiz-shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .quiz-intro,
    .quiz-card,
    .product-note {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .quiz-intro h2 {
      font-size: 20px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .quiz-intro p,
    .product-note p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .quiz-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .quiz-mode-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .quiz-mode-btn {
      min-height: 42px;
      border-radius: 11px;
      border: 1.5px solid var(--border);
      background: var(--bg-subtle);
      color: var(--text-secondary);
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .quiz-mode-btn.active {
      border-color: var(--quiz);
      background: var(--quiz-soft);
      color: var(--quiz);
    }

    .quiz-mode-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .quiz-select {
      width: 100%;
      min-height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg-subtle);
      color: var(--text-primary);
      padding: 0 12px;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
    }

    .quiz-primary-btn,
    .quiz-secondary-btn {
      min-height: 48px;
      border-radius: 12px;
      border: none;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .quiz-primary-btn {
      background: var(--quiz);
      color: #FFFFFF;
    }

    .quiz-secondary-btn {
      background: var(--quiz-soft);
      color: var(--quiz);
    }

    .quiz-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 700;
    }

    .quiz-meter {
      height: 8px;
      flex: 1;
      border-radius: 999px;
      background: var(--bg-subtle);
      overflow: hidden;
    }

    .quiz-meter-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--quiz);
      transition: width 0.25s ease;
    }

    .quiz-prompt-label {
      font-size: 12px;
      color: var(--quiz);
      font-weight: 900;
      margin-bottom: 10px;
    }

    .quiz-expression {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      line-height: 1.35;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .quiz-situation {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .quiz-cue-note {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .quiz-hint-stack {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quiz-hint {
      border-radius: 12px;
      background: var(--bg-subtle);
      padding: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.45;
    }

    .quiz-hint strong {
      color: var(--text-primary);
    }

    .quiz-recall-input {
      width: 100%;
      min-height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg-subtle);
      color: var(--text-primary);
      padding: 0 14px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      outline: none;
    }

    .quiz-recall-input:focus {
      border-color: var(--quiz);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--quiz) 16%, transparent);
    }

    .quiz-recall-input.correct {
      border-color: var(--success);
    }

    .quiz-recall-input.wrong {
      border-color: var(--danger);
    }

    .quiz-options {
      display: grid;
      gap: 10px;
    }

    .quiz-option {
      min-height: 52px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg-subtle);
      color: var(--text-primary);
      padding: 12px 14px;
      text-align: left;
      font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .quiz-option.correct {
      border-color: var(--success);
      background: color-mix(in srgb, var(--success) 14%, var(--bg-card));
      color: var(--success);
    }

    .quiz-option.wrong {
      border-color: var(--danger);
      background: color-mix(in srgb, var(--danger) 12%, var(--bg-card));
      color: var(--danger);
    }

    .quiz-feedback {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: var(--bg-warm);
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }

    .quiz-feedback.visible {
      display: block;
    }

    .quiz-feedback .quiz-hint-stack {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .quiz-action-row {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .quiz-stat-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .quiz-stat-pill {
      border-radius: 999px;
      background: var(--bg-subtle);
      padding: 7px 10px;
    }

    .quiz-result {
      text-align: center;
      padding: 26px 16px;
    }

    .quiz-result-score {
      font-size: 34px;
      font-weight: 900;
      color: var(--quiz);
      margin-bottom: 8px;
    }

    .quiz-result p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .product-note {
      border-color: color-mix(in srgb, var(--study) 30%, var(--border));
      background: color-mix(in srgb, var(--study-soft) 56%, var(--bg-card));
    }

    .product-note h3 {
      font-size: 15px;
      margin-bottom: 6px;
    }

    /* Highlight pulse */
    @keyframes highlightPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(194, 120, 92, 0); }
      50% { box-shadow: 0 0 0 6px rgba(194, 120, 92, 0.25); }
    }

    .highlight-pulse {
      animation: highlightPulse 0.8s ease-in-out 2;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent-dark);
      color: #FFFFFF;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (prefers-color-scheme: dark) {
      .toast {
        background: #EAE7E1;
        color: #1A1814;
      }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 0 20px;
    }

    .footer p {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }

    .footer a {
      color: var(--text-tertiary);
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--accent);
    }

    .footer-icon svg {
      width: 16px;
      height: 16px;
    }

    /* Bottom bar spacing */
    .bottom-bar.visible ~ .container,
    body.has-bottom-bar .container {
      padding-bottom: 80px;
    }
  </style>
</head>

  <script>

    // ─── Helpers ───
    function getDailyIndex(arrayLength) {
      const today = new Date();
      const start = new Date(today.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((today - start) / 86400000);
      return dayOfYear % arrayLength;
    }

    function getCategoryInfo(categoryId) {
      const cat = CATEGORIES.find(c => c.id === categoryId);
      return cat || { emoji: '', label: categoryId || '' };
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function switchHub(hub) {
      activeHub = hub;
      hubTabs.forEach(tab => {
        const isActive = tab.dataset.hub === hub;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });
      dictionaryHub.classList.toggle('hidden', hub !== 'dictionary');
      quizHub.classList.toggle('hidden', hub !== 'quiz');
      if (hub === 'quiz') renderQuiz();
    }

    // ─── Bookmarks ───
    function getBookmarks() {
      try { return JSON.parse(localStorage.getItem('ok_english_bookmarks') || '[]'); }
      catch { return []; }
    }

    function toggleBookmark(id) {
      const bm = getBookmarks();
      const idx = bm.indexOf(id);
      const isAdding = idx === -1;
      if (isAdding) bm.push(id); else bm.splice(idx, 1);
      localStorage.setItem('ok_english_bookmarks', JSON.stringify(bm));
      const entry = REELS_DATA.find(r => r.id === id);
      if (entry) trackBookmark(entry, isAdding);
      showToast(isAdding ? '표현을 저장했어요!' : '저장을 해제했어요');
      updateBookmarkUI();
      render();
    }

    function isBookmarked(id) {
      return getBookmarks().includes(id);
    }

    function updateBookmarkUI() {
      const bm = getBookmarks();
      headerBookmarkBtn.classList.toggle('active', bookmarkMode);
      if (bookmarkMode) {
        headerBookmarkBtn.querySelector('svg').setAttribute('fill', 'currentColor');
      } else {
        headerBookmarkBtn.querySelector('svg').setAttribute('fill', 'none');
      }
      document.querySelectorAll('.card-bookmark-btn').forEach(btn => {
        const id = parseInt(btn.dataset.id);
        btn.classList.toggle('bookmarked', bm.includes(id));
        const svg = btn.querySelector('svg');
        svg.setAttribute('fill', bm.includes(id) ? 'currentColor' : 'none');
      });
    }

    // ─── Toast ───
    function showToast(message, duration = 1500) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }

    // ─── GA4 Tracking ───
    function trackSearch(query, resultCount, method) {
      gtag('event', 'search', { search_term: query, result_count: resultCount, search_method: method });
    }

    function trackWatch(entry) {
      gtag('event', 'watch_reel', { expression: entry.expression_en, category: entry.category, difficulty: entry.difficulty, entry_id: entry.id });
    }

    function trackShare(entry) {
      gtag('event', 'share', { content_type: 'expression', item_id: entry.id, expression: entry.expression_en });
    }

    function trackBookmark(entry, isAdding) {
      gtag('event', isAdding ? 'bookmark_add' : 'bookmark_remove', { expression: entry.expression_en, entry_id: entry.id });
    }

    function trackCategoryFilter(category) {
      gtag('event', 'filter_category', { category: category });
    }

    function trackCTA(location) {
      gtag('event', 'cta_click', { cta_type: 'okmorning_app', cta_location: location });
    }

    function trackDailyView(entry) {
      gtag('event', 'daily_expression_view', { expression: entry.expression_en, entry_id: entry.id });
    }

    // ─── Local Search ───
    function localSearch(query) {
      const q = query.toLowerCase().trim();
      if (!q) return REELS_DATA;

      return REELS_DATA
        .map(entry => {
          let score = 0;
          if (entry.expression_en.toLowerCase().includes(q)) score += 10;
          if (entry.situation_kr.includes(q)) score += 10;
          if (entry.expression_meaning_kr && entry.expression_meaning_kr.includes(q)) score += 8;
          if (entry.description_kr.includes(q)) score += 3;

          const allKeywords = [
            ...(entry.search_keywords_kr || []),
            ...(entry.search_keywords_en || [])
          ];
          const kwMatch = allKeywords.filter(kw =>
            kw.toLowerCase().includes(q) || q.includes(kw.toLowerCase())
          );
          score += kwMatch.length * 5;

          const words = q.split(/\s+/);
          if (words.length > 1) {
            const allText = [entry.expression_en, entry.situation_kr, entry.expression_meaning_kr, entry.description_kr, ...allKeywords].join(' ').toLowerCase();
            const matched = words.filter(w => allText.includes(w)).length;
            score += (matched / words.length) * 8;
          }

          return { ...entry, _score: score };
        })
        .filter(e => e._score > 0)
        .sort((a, b) => b._score - a._score);
    }

    // ─── LLM Search ───
    async function llmSearch(query) {
      const entries = REELS_DATA.map(r => ({
        id: r.id,
        e: r.expression_en,
        s: r.situation_kr,
        m: r.expression_meaning_kr || '',
        k: [...(r.search_keywords_kr || []), ...(r.search_keywords_en || [])]
      }));

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, entries })
        });

        if (!res.ok) throw new Error('API error');
        const { results } = await res.json();
        return results.map(id => REELS_DATA.find(r => r.id === id)).filter(Boolean);
      } catch (err) {
        console.error('LLM search failed, using local:', err);
        return null;
      }
    }

    function isKoreanNaturalLanguage(query) {
      const hangulMatch = query.match(/[\uAC00-\uD7AF]/g);
      return hangulMatch && hangulMatch.length > 2;
    }

    // ─── Share ───
    function shareCard(entry) {
      const url = `${location.origin}${location.pathname}?id=${entry.id}`;
      const text = `${entry.expression_en} — ${entry.expression_meaning_kr}\n${entry.situation_kr}`;

      if (navigator.share) {
        navigator.share({ title: entry.expression_en, text, url });
      } else {
        navigator.clipboard.writeText(url).then(() => {
          showToast('링크가 복사됐어요!');
        });
      }
      trackShare(entry);
    }

    // ─── Quiz Hub ───
    function getMissedIds() {
      try {
        const parsed = JSON.parse(localStorage.getItem(QUIZ_MISSED_KEY) || '[]');
        return Array.isArray(parsed) ? parsed.map(String) : [];
      } catch {
        return [];
      }
    }

    function setMissedIds(ids) {
      const unique = [...new Set(ids.map(String))];
      localStorage.setItem(QUIZ_MISSED_KEY, JSON.stringify(unique));
      updateQuizMissedCount();
    }

    function updateQuizMissedCount() {
      const count = getMissedIds().filter(id => REELS_DATA.some(entry => String(entry.id) === id)).length;
      quizMissedCount.textContent = `오답 ${count}개`;
      quizModeButtons.forEach(button => {
        if (button.dataset.mode === 'missed') button.disabled = count === 0;
      });
    }

    function recordQuizResult(entryId, isCorrect) {
      const id = String(entryId);
      const missed = getMissedIds();
      if (isCorrect) {
        setMissedIds(missed.filter(itemId => itemId !== id));
      } else {
        setMissedIds([id, ...missed]);
        if (!quizState.missedThisRound.includes(id)) {
          quizState.missedThisRound.push(id);
        }
      }
    }

    function normalizeQuizAnswer(value) {
      return value
        .toLowerCase()
        .replace(/[’']/g, '')
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isRecallCorrect(answer, correct) {
      const normalizedAnswer = normalizeQuizAnswer(answer);
      const normalizedCorrect = normalizeQuizAnswer(correct);
      return normalizedAnswer === normalizedCorrect ||
        normalizedAnswer.replace(/\s/g, '') === normalizedCorrect.replace(/\s/g, '');
    }

    function initQuizCategorySelect() {
      const options = [
        '<option value="">전체 표현</option>',
        ...CATEGORIES.map(cat => `<option value="${escapeHtml(cat.id)}">${cat.emoji} ${escapeHtml(cat.label)}</option>`)
      ];
      quizCategorySelect.innerHTML = options.join('');
    }

    function getQuizPool() {
      const category = quizCategorySelect.value;
      return REELS_DATA.filter(entry => {
        if (!entry.expression_en || !entry.expression_meaning_kr || !entry.situation_kr) return false;
        if (category && entry.category !== category) return false;
        return true;
      });
    }

    function getActiveQuizPool() {
      const pool = getQuizPool();
      if (quizState.mode !== 'missed') return pool;

      const missedIds = new Set(getMissedIds());
      return pool.filter(entry => missedIds.has(String(entry.id)));
    }

    function getQuizQuestionType(index) {
      if (quizState.mode === 'mixed' || quizState.mode === 'missed') {
        return ['recall', 'meaning', 'situation'][index % 3];
      }
      return quizState.mode;
    }

    function getDistractorCandidates(entry, pool, field) {
      const seen = new Set([entry[field]]);
      const tiers = [
        pool.filter(item => item.id !== entry.id && item.category === entry.category && item.difficulty === entry.difficulty),
        pool.filter(item => item.id !== entry.id && item.category === entry.category),
        pool.filter(item => item.id !== entry.id && item.difficulty === entry.difficulty),
        pool.filter(item => item.id !== entry.id)
      ];
      const candidates = [];

      tiers.forEach(tier => {
        shuffle(tier).forEach(item => {
          if (!item[field] || seen.has(item[field]) || candidates.length >= 3) return;
          seen.add(item[field]);
          candidates.push(item);
        });
      });

      return candidates;
    }

    function buildRecallQuestion(entry, index) {
      const cueType = index % 2 === 0 ? 'meaning' : 'situation';
      const cueText = cueType === 'meaning' ? entry.expression_meaning_kr : entry.situation_kr;
      return { entry, type: 'recall', options: [], cueType, cueText };
    }

    function buildMultipleChoiceQuestion(entry, pool, type) {
      const field = type === 'situation' ? 'situation_kr' : 'expression_meaning_kr';
      const distractors = getDistractorCandidates(entry, pool, field);
      const options = shuffle([entry, ...distractors].map(item => item[field]));

      if (options.length < 2) {
        return buildRecallQuestion(entry, 0);
      }
      return { entry, type, options };
    }

    function buildQuizDeck() {
      const pool = getActiveQuizPool();
      const selected = shuffle(pool).slice(0, Math.min(QUIZ_LENGTH, pool.length));
      quizState = {
        ...quizState,
        deck: selected.map((entry, index) => {
          const type = getQuizQuestionType(index);
          if (type === 'recall') return buildRecallQuestion(entry, index);
          return buildMultipleChoiceQuestion(entry, pool, type);
        }),
        index: 0,
        score: 0,
        answered: false,
        missedThisRound: []
      };
      renderQuiz();
    }

    function renderQuiz() {
      const pool = getActiveQuizPool();
      if (!quizState.deck.length) {
        quizProgress.hidden = true;
        const isMissedMode = quizState.mode === 'missed';
        quizCard.innerHTML = `
          <div class="quiz-result">
            <div class="quiz-result-score">${pool.length}</div>
            <p>${isMissedMode ? '오답 큐에 남아 있는 표현입니다.' : '선택한 범위에서 퀴즈로 풀 수 있는 표현입니다.'}</p>
          </div>`;
        quizStartBtn.disabled = pool.length === 0;
        quizStartBtn.textContent = pool.length === 0 ? '표현이 부족해요' : `${Math.min(QUIZ_LENGTH, pool.length)}문제 시작`;
        updateQuizMissedCount();
        return;
      }

      if (quizState.index >= quizState.deck.length) {
        const percent = Math.round((quizState.score / quizState.deck.length) * 100);
        const missedCount = quizState.missedThisRound.length;
        quizProgress.hidden = true;
        quizCard.innerHTML = `
          <div class="quiz-result">
            <div class="quiz-result-score">${quizState.score}/${quizState.deck.length}</div>
            <p>${percent >= 80 ? '기억에서 잘 꺼내고 있어요.' : '오답 표현을 짧게 다시 꺼내보세요.'}</p>
            <div class="quiz-stat-row">
              <span class="quiz-stat-pill">정답률 ${percent}%</span>
              <span class="quiz-stat-pill">이번 오답 ${missedCount}개</span>
            </div>
            <button class="quiz-primary-btn" id="quizRestartBtn">다시 풀기</button>
            ${getMissedIds().length ? '<button class="quiz-secondary-btn" id="quizMissedBtn" style="margin-top:8px;">틀린 표현 다시 풀기</button>' : ''}
          </div>`;
        document.getElementById('quizRestartBtn').addEventListener('click', buildQuizDeck);
        const missedBtn = document.getElementById('quizMissedBtn');
        if (missedBtn) {
          missedBtn.addEventListener('click', () => {
            setQuizMode('missed');
            buildQuizDeck();
          });
        }
        return;
      }

      const current = quizState.deck[quizState.index];
      const entry = current.entry;
      quizProgress.hidden = false;
      quizStepText.textContent = `${quizState.index + 1}/${quizState.deck.length}`;
      quizScoreText.textContent = `${quizState.score}점`;
      quizMeterFill.style.width = `${(quizState.index / quizState.deck.length) * 100}%`;

      if (current.type === 'recall') {
        const cueLabel = current.cueType === 'meaning' ? '뜻' : '상황';
        quizCard.innerHTML = `
          <div class="quiz-prompt-label">영어 표현을 직접 입력하세요</div>
          <div class="quiz-hint-stack">
            <div class="quiz-hint"><strong>${cueLabel}</strong><br>${escapeHtml(current.cueText)}</div>
          </div>
          <input class="quiz-recall-input" id="quizRecallInput" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="English expression">
          <div class="quiz-action-row">
            <button class="quiz-secondary-btn" id="quizSkipBtn">모르겠어요</button>
            <button class="quiz-primary-btn" id="quizSubmitBtn">확인</button>
          </div>
          <div class="quiz-feedback" id="quizFeedback"></div>`;
        const recallInput = document.getElementById('quizRecallInput');
        document.getElementById('quizSubmitBtn').addEventListener('click', () => answerRecallQuiz(recallInput.value));
        document.getElementById('quizSkipBtn').addEventListener('click', () => answerRecallQuiz(''));
        recallInput.addEventListener('keydown', event => {
          if (event.key === 'Enter') answerRecallQuiz(recallInput.value);
        });
        setTimeout(() => recallInput.focus(), 0);
        return;
      }

      const label = current.type === 'situation' ? '쓸 수 있는 상황을 고르세요' : '뜻을 고르세요';
      const cueNote = current.type === 'situation'
        ? '표현만 보고 어느 상황에서 쓰는지 먼저 떠올린 뒤 고르세요.'
        : '표현만 보고 한국어 뜻을 먼저 떠올린 뒤 고르세요.';
      quizCard.innerHTML = `
        <div class="quiz-prompt-label">${label}</div>
        <div class="quiz-expression">${escapeHtml(entry.expression_en)}</div>
        <div class="quiz-cue-note">${escapeHtml(cueNote)}</div>
        <div class="quiz-options">
          ${current.options.map((option, index) => `
            <button class="quiz-option" data-index="${index}">${escapeHtml(option)}</button>
          `).join('')}
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>`;

      quizCard.querySelectorAll('.quiz-option').forEach(button => {
        button.addEventListener('click', () => answerChoiceQuiz(button));
      });
    }

    function answerChoiceQuiz(button) {
      if (quizState.answered) return;
      quizState.answered = true;
      const current = quizState.deck[quizState.index];
      const selected = current.options[parseInt(button.dataset.index)];
      const field = current.type === 'situation' ? 'situation_kr' : 'expression_meaning_kr';
      const correct = current.entry[field];
      const isCorrect = selected === correct;
      if (isCorrect) quizState.score += 1;
      recordQuizResult(current.entry.id, isCorrect);

      quizCard.querySelectorAll('.quiz-option').forEach(optionBtn => {
        const option = current.options[parseInt(optionBtn.dataset.index)];
        optionBtn.classList.toggle('correct', option === correct);
        optionBtn.classList.toggle('wrong', option === selected && !isCorrect);
      });

      showQuizFeedback(isCorrect, correct, current.entry);
    }

    function answerRecallQuiz(answer) {
      if (quizState.answered) return;
      quizState.answered = true;
      const current = quizState.deck[quizState.index];
      const correct = current.entry.expression_en;
      const isCorrect = isRecallCorrect(answer, correct);
      if (isCorrect) quizState.score += 1;
      recordQuizResult(current.entry.id, isCorrect);

      const recallInput = document.getElementById('quizRecallInput');
      recallInput.disabled = true;
      recallInput.classList.add(isCorrect ? 'correct' : 'wrong');
      showQuizFeedback(isCorrect, correct, current.entry);
    }

    function showQuizFeedback(isCorrect, correct, entry) {
      const feedback = document.getElementById('quizFeedback');
      feedback.classList.add('visible');
      feedback.innerHTML = `
        <strong>${isCorrect ? '정답입니다.' : `정답은 ${escapeHtml(correct)} 입니다.`}</strong><br>
        <div class="quiz-hint-stack">
          <div class="quiz-hint"><strong>뜻</strong><br>${escapeHtml(entry.expression_meaning_kr)}</div>
          <div class="quiz-hint"><strong>상황</strong><br>${escapeHtml(entry.situation_kr)}</div>
        </div>
        ${escapeHtml(entry.description_kr)}
        <div class="quiz-action-row">
          <button class="quiz-secondary-btn" id="quizWatchBtn">릴스 보기</button>
          <button class="quiz-primary-btn" id="quizNextBtn">${quizState.index + 1 === quizState.deck.length ? '결과 보기' : '다음 문제'}</button>
        </div>`;
      document.getElementById('quizWatchBtn').addEventListener('click', () => {
        window.open(entry.reel_url, '_blank');
        trackWatch(entry);
      });
      document.getElementById('quizNextBtn').addEventListener('click', () => {
        quizState.index += 1;
        quizState.answered = false;
        if (quizState.index >= quizState.deck.length) {
          quizMeterFill.style.width = '100%';
        }
        renderQuiz();
      });
    }

    function setQuizMode(mode) {
      quizState = {
        ...quizState,
        mode,
        deck: [],
        index: 0,
        score: 0,
        answered: false,
        missedThisRound: []
      };
      quizModeButtons.forEach(button => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
      renderQuiz();
    }

    // ─── Render ───
    function render() {
      const query = searchInput.value.trim();
      clearBtn.classList.toggle('visible', query.length > 0);

      let results;
      if (currentResults && query) {
        results = currentResults;
      } else if (query) {
        results = localSearch(query);
      } else {
        results = [...REELS_DATA];
      }

      // Apply category filter
      if (activeCategory) {
        results = results.filter(r => r.category === activeCategory);
      }

      // Apply bookmark filter
      if (bookmarkMode) {
        const bm = getBookmarks();
        results = results.filter(r => bm.includes(r.id));
      }

      // Sort
      if (!query || !currentResults) {
        if (sortMode === 'alpha') {
          results.sort((a, b) => a.expression_en.localeCompare(b.expression_en));
        } else {
          results.sort((a, b) => {
            const dateA = a.date || '';
            const dateB = b.date || '';
            return dateB.localeCompare(dateA);
          });
        }
      }

      // Result count
      let countText = '';
      if (bookmarkMode) {
        countText = `저장한 표현 <strong>${results.length}</strong>개`;
      } else {
        countText = `<strong>${results.length}</strong>개 표현`;
        const filters = [];
        if (activeCategory) {
          const cat = getCategoryInfo(activeCategory);
          filters.push(`${cat.emoji} ${cat.label}`);
        }
        if (query) filters.push(`"${escapeHtml(query)}"`);
        if (filters.length) countText += ' · ' + filters.join(' · ');
      }
      resultCount.innerHTML = countText;

      // Category count
      if (activeCategory && !bookmarkMode) {
        const cat = getCategoryInfo(activeCategory);
        const catCount = REELS_DATA.filter(r => r.category === activeCategory).length;
        categoryCountEl.innerHTML = `${cat.emoji} ${cat.label} ${catCount}개 표현`;
        categoryCountEl.classList.add('visible');
      } else {
        categoryCountEl.classList.remove('visible');
      }

      // Empty state
      if (results.length === 0) {
        if (bookmarkMode) {
          cardList.innerHTML = `
            <div class="empty-state">
              <p class="empty-title">아직 저장한 표현이 없어요</p>
              <p class="empty-subtitle">♡를 눌러 표현을 저장하세요</p>
            </div>`;
        } else {
          cardList.innerHTML = `
            <div class="empty-state">
              <p class="empty-title">검색 결과가 없어요</p>
              <p class="empty-subtitle">다른 표현으로 검색하거나, 카테고리를 둘러보세요</p>
              <div class="suggested-searches">
                <button class="suggested-pill" data-query="정중하게 거절할 때">정중하게 거절할 때</button>
                <button class="suggested-pill" data-query="카페 주문 표현">카페 주문 표현</button>
                <button class="suggested-pill" data-query="비즈니스 이메일">비즈니스 이메일</button>
              </div>
            </div>`;
          document.querySelectorAll('.suggested-pill').forEach(btn => {
            btn.addEventListener('click', () => {
              searchInput.value = btn.dataset.query;
              handleSearchInput();
            });
          });
        }
        return;
      }

      // Build cards HTML
      const cardsHtml = [];
      results.forEach((item, i) => {
        // Insert CTA banner after 5th card
        if (i === 5) {
          cardsHtml.push(`
            <div class="cta-banner">
              <h3>📱 더 많은 영어 표현을 만나보세요</h3>
              <p>영어는옥쌤 인스타그램에서 매일 새로운 표현을 배워요</p>
              <a href="https://www.instagram.com/ok.english.kr/" target="_blank" rel="noopener noreferrer" class="cta-button" onclick="trackCTA('inline_banner')">인스타그램 팔로우 →</a>
            </div>`);
        }

        const cat = getCategoryInfo(item.category);
        const diffClass = `diff-${item.difficulty || 'beginner'}`;
        const bookmarkedClass = isBookmarked(item.id) ? 'bookmarked' : '';
        const bookmarkedFill = isBookmarked(item.id) ? 'currentColor' : 'none';

        cardsHtml.push(`
          <div class="card" id="card-${item.id}" style="animation-delay: ${i * 0.03}s">
            <div class="card-action-row">
              <span class="difficulty-badge ${diffClass}">
                <span class="difficulty-dot"></span>
                ${escapeHtml(item.difficulty || 'beginner')}
              </span>
              <div class="card-actions">
                <button class="card-action-btn card-bookmark-btn ${bookmarkedClass}" data-id="${item.id}" aria-label="저장" onclick="toggleBookmark(${item.id})">
                  <svg viewBox="0 0 24 24" fill="${bookmarkedFill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                  </svg>
                </button>
                <button class="card-action-btn" aria-label="공유" onclick="shareCard(REELS_DATA.find(r=>r.id===${item.id}))">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
                  </svg>
                </button>
                <button class="card-action-btn watch-btn" aria-label="시청" onclick="window.open('${escapeHtml(item.reel_url)}','_blank');trackWatch(REELS_DATA.find(r=>r.id===${item.id}))">
                  <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="5,3 19,12 5,21"/></svg>
                  시청
                </button>
              </div>
            </div>
            <div class="card-expression">${escapeHtml(item.expression_en)}</div>
            <div class="card-meaning">${escapeHtml(item.expression_meaning_kr)}</div>
            <div class="card-situation">${escapeHtml(item.situation_kr)}</div>
            <div class="card-description">${escapeHtml(item.description_kr)}</div>
            <span class="card-category-pill">${cat.emoji} ${escapeHtml(cat.label)}</span>
          </div>`);
      });

      cardList.innerHTML = cardsHtml.join('');
    }

    // ─── Search Input Handler ───
    let localDebounce = null;
    function handleSearchInput() {
      const query = searchInput.value.trim();
      clearTimeout(localDebounce);
      clearTimeout(llmTimer);

      if (!query) {
        currentResults = null;
        llmIndicator.classList.remove('visible');
        render();
        return;
      }

      // Local search with 100ms debounce
      localDebounce = setTimeout(() => {
        currentResults = localSearch(query);
        render();
        trackSearch(query, currentResults.length, 'local');
      }, 100);

      // LLM search for Korean natural language
      if (query.length >= 3 && isKoreanNaturalLanguage(query)) {
        llmTimer = setTimeout(async () => {
          llmIndicator.classList.add('visible');
          const llmResults = await llmSearch(query);
          llmIndicator.classList.remove('visible');
          if (llmResults && searchInput.value.trim() === query) {
            currentResults = llmResults;
            render();
            trackSearch(query, llmResults.length, 'llm');
          }
        }, 800);
      }
    }

    searchInput.addEventListener('input', handleSearchInput);

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      currentResults = null;
      activeCategory = null;
      llmIndicator.classList.remove('visible');
      document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
      categoryCountEl.classList.remove('visible');
      searchInput.focus();
      render();
    });

    // ─── Category Filter ───
    CATEGORIES.forEach(cat => {
      const pill = document.createElement('button');
      pill.className = 'tag-pill';
      pill.textContent = `${cat.emoji} ${cat.label}`;
      pill.dataset.category = cat.id;
      pill.addEventListener('click', () => {
        if (activeCategory === cat.id) {
          activeCategory = null;
          pill.classList.remove('active');
        } else {
          activeCategory = cat.id;
          document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          trackCategoryFilter(cat.id);
        }
        render();
      });
      tagsRow.appendChild(pill);
    });

    // ─── Sort Toggle ───
    sortToggle.addEventListener('click', () => {
      sortMode = sortMode === 'date' ? 'alpha' : 'date';
      const spans = sortToggle.querySelectorAll('span');
      spans[0].classList.toggle('active', sortMode === 'date');
      spans[1].classList.toggle('active', sortMode === 'alpha');
      render();
    });

    // ─── Header Bookmark Toggle ───
    headerBookmarkBtn.addEventListener('click', () => {
      bookmarkMode = !bookmarkMode;
      updateBookmarkUI();
      render();
    });

    // ─── Daily Feature ───
    function initDaily() {
      const dailyIdx = getDailyIndex(REELS_DATA.length);
      const entry = REELS_DATA[dailyIdx];

      document.getElementById('dailyExpression').textContent = entry.expression_en;
      document.getElementById('dailyMeaning').textContent = entry.expression_meaning_kr || '';
      document.getElementById('dailySituation').textContent = entry.situation_kr;
      document.getElementById('dailyDescription').textContent = entry.description_kr;

      const cat = getCategoryInfo(entry.category);
      document.getElementById('dailyCategory').innerHTML = `${cat.emoji} ${escapeHtml(cat.label)}`;

      const diffClass = `diff-${entry.difficulty || 'beginner'}`;
      document.getElementById('dailyDifficulty').className = `difficulty-badge ${diffClass}`;
      document.getElementById('dailyDifficulty').innerHTML = `<span class="difficulty-dot"></span>${entry.difficulty || 'beginner'}`;

      document.getElementById('dailyCard').addEventListener('click', () => {
        window.open(entry.reel_url, '_blank');
        trackWatch(entry);
      });

      trackDailyView(entry);

      // Daily quote
      const quoteIdx = getDailyIndex(DAILY_QUOTES.length);
      document.getElementById('dailyQuote').textContent = `"${DAILY_QUOTES[quoteIdx]}"`;
    }

    // ─── Bottom Bar ───
    function initBottomBar() {
      const dismissed = localStorage.getItem('ok_bottom_bar_dismissed');
      if (dismissed) {
        const dismissedAt = parseInt(dismissed);
        if (Date.now() - dismissedAt < 7 * 24 * 60 * 60 * 1000) return;
      }
      setTimeout(() => {
        bottomBar.classList.add('visible');
        document.body.classList.add('has-bottom-bar');
      }, 3000);
    }

    bottomBarClose.addEventListener('click', () => {
      bottomBar.classList.remove('visible');
      document.body.classList.remove('has-bottom-bar');
      localStorage.setItem('ok_bottom_bar_dismissed', Date.now().toString());
    });

    hubTabs.forEach(tab => {
      tab.addEventListener('click', () => switchHub(tab.dataset.hub));
    });

    quizStartBtn.addEventListener('click', buildQuizDeck);

    quizModeButtons.forEach(button => {
      button.addEventListener('click', () => {
        if (button.disabled) return;
        setQuizMode(button.dataset.mode);
      });
    });

    quizCategorySelect.addEventListener('change', () => {
      quizState = {
        ...quizState,
        deck: [],
        index: 0,
        score: 0,
        answered: false,
        missedThisRound: []
      };
      renderQuiz();
    });

    // ─── Deep Linking ───
    function handleDeepLinks() {
      const params = new URLSearchParams(location.search);

      if (params.get('q')) {
        searchInput.value = params.get('q');
        handleSearchInput();
      }

      if (params.get('cat')) {
        const catId = params.get('cat');
        activeCategory = catId;
        const pill = document.querySelector(`.tag-pill[data-category="${catId}"]`);
        if (pill) pill.classList.add('active');
        render();
      }

      if (params.get('id')) {
        setTimeout(() => {
          const target = document.getElementById('card-' + params.get('id'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.classList.add('highlight-pulse');
            setTimeout(() => target.classList.remove('highlight-pulse'), 2000);
          }
        }, 500);
      }
    }

    // ─── Footer ───
    document.getElementById('footerCount').textContent = `총 ${REELS_DATA.length}개 표현 수록`;

    // ─── Init ───
    initQuizCategorySelect();
    updateQuizMissedCount();
    initDaily();
    render();
    renderQuiz();
    handleDeepLinks();
    initBottomBar();
  </script>
</body>
</html>
